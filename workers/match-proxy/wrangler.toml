name = "match-cache-prod"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# KV 네임스페이스 바인딩
kv_namespaces = [
  { binding = "MATCH_CACHE", id = "4185123fad624852b3948ec16e4e0aae" },
  { binding = "ASSET_CACHE", id = "5e0f10ac1f1841babd2465950a109ffb" }
]

# 환경 변수 (API 키는 `wrangler secret put API_SPORTS_KEY`로 별도 설정)
[vars]
ALLOWED_ORIGINS = "https://4590football.com,https://www.4590football.com,http://localhost:3000"
CACHE_TTL_SECONDS = "2592000"  # 30일

[observability]
enabled = true
